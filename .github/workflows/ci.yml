name: CI

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Rust contract tests (cargo test)
  # ──────────────────────────────────────────────────────────────
  contract-tests:
    name: Contract Tests (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract tests
        run: cargo test --workspace --verbose

      - name: Build WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release --workspace

  # ──────────────────────────────────────────────────────────────
  # Job 2: TypeScript SDK tests (vitest)
  # ──────────────────────────────────────────────────────────────
  sdk-tests:
    name: SDK Tests (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: npm ci
        working-directory: sdk

      - name: Run SDK unit tests
        run: npm test -- --reporter=verbose
        working-directory: sdk

  # ──────────────────────────────────────────────────────────────
  # Job 3: Reference app build
  # ──────────────────────────────────────────────────────────────
  app-build:
    name: App Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Build production bundle
        run: npm run build
        working-directory: app
        env:
          VITE_CONTRACT_ID: "PLACEHOLDER_FOR_CI_BUILD"
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_RPC_URL: "https://soroban-testnet.stellar.org"
